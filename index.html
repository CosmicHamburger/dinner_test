<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今晚吃啥？| 随机晚餐抽奖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #ff6b6b;
            font-size: 26px;
            margin-bottom: 25px;
        }
        .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 14px;
            border: 1px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            border-color: #ff6b6b;
        }
        button {
            padding: 14px 16px;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-add {
            background: #ff6b6b;
        }
        .btn-draw {
            background: #4ecdc4;
        }
        .btn-clear {
            background: #95a5a6;
        }
        .list {
            margin: 25px 0;
            min-height: 120px;
        }
        .item {
            padding: 12px;
            margin: 8px 0;
            background: #f9f9f9;
            border-radius: 10px;
            text-align: center;
            font-size: 16px;
            transition: 0.3s;
        }
        .win {
            background: #ffd93d;
            font-weight: bold;
            transform: scale(1.08);
            box-shadow: 0 4px 10px rgba(255,217,61,0.4);
        }
        .result {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #ff6b6b;
            margin: 20px 0;
            min-height: 35px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🍚 今晚吃啥？抽奖啦</h2>
        <div class="input-box">
            <input type="text" id="dinnerInput" placeholder="输入晚餐名称（如：火锅、烧烤）">
            <button class="btn-add" onclick="addDinner()">添加</button>
        </div>
        <div class="list" id="dinnerList"></div>
        <div class="result" id="result"></div>
        <div class="input-box">
            <button class="btn-draw" onclick="luckyDraw()">开始抽奖</button>
            <button class="btn-clear" onclick="clearAll()">清空全部</button>
        </div>
    </div>

    <script>
        let dinnerList = JSON.parse(localStorage.getItem('dinnerList')) || [];
        const input = document.getElementById('dinnerInput');
        const listDom = document.getElementById('dinnerList');
        const resultDom = document.getElementById('result');

        function renderList() {
            listDom.innerHTML = dinnerList.map(item => `<div class="item">${item}</div>`).join('');
            resultDom.innerText = '';
            localStorage.setItem('dinnerList', JSON.stringify(dinnerList));
        }

        function addDinner() {
            const value = input.value.trim();
            if (!value) return alert('请输入晚餐名称！');
            if (dinnerList.includes(value)) return alert('已经添加过啦！');
            dinnerList.push(value);
            renderList();
            input.value = '';
        }

        function luckyDraw() {
            if (dinnerList.length < 2) return alert('至少添加2个选项才能抽奖哦！');
            const randomIndex = Math.floor(Math.random() * dinnerList.length);
            const winner = dinnerList[randomIndex];
            resultDom.innerText = `🎉 中奖：${winner}！`;
            
            const items = document.querySelectorAll('.item');
            items.forEach((el, idx) => {
                el.classList.toggle('win', idx === randomIndex);
            });
        }

        function clearAll() {
            dinnerList = [];
            renderList();
        }

        renderList();
    </script>
</body>
</html>
